name: Finaliser un livret (PDF + Notion)

on:
  workflow_dispatch:
    inputs:
      nom_fichier:
        description: "Nom du livret (ex: arthrose-genou)"
        required: true

jobs:
  finalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Installer les dépendances npm
        run: npm install

      - name: Configurer git
        run: |
          git config user.name "Noémie Livrets"
          git config user.email "actions@github.com"

      - name: Finaliser le livret
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOM_FICHIER: ${{ github.event.inputs.nom_fichier }}
        run: node scripts/finalize-livret.js "$NOM_FICHIER"
